<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyy - TikTok Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #fe2c55;
            --primary-dark: #e0244a;
            --primary-gradient: linear-gradient(135deg, #fe2c55 0%, #ff6b81 100%);
            --dark: #0f0f0f;
            --dark-secondary: #1a1a1a;
            --bg: #0a0a0a;
            --surface: #161616;
            --surface-hover: #1f1f1f;
            --text: #ffffff;
            --text-secondary: #a0a0a0;
            --border: #2a2a2a;
            --success: #00d26a;
            --warning: #ffb800;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
        }

        body { 
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text);
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 20% 50%, rgba(254, 44, 85, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 107, 129, 0.1) 0%, transparent 50%);
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        /* Navbar */
        .navbar {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%;
            background: rgba(22, 22, 22, 0.8);
            backdrop-filter: blur(20px);
            padding: 15px 25px;
            display: flex; 
            align-items: center; 
            gap: 15px;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .menu-btn { 
            font-size: 1.3rem; 
            cursor: pointer; 
            color: var(--text);
            border: none; 
            background: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .menu-btn:hover {
            background: var(--surface-hover);
        }

        .nav-title { 
            font-size: 1.1rem; 
            font-weight: 700; 
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Sidebar */
        .sidebar {
            position: fixed; 
            top: 0; 
            left: -320px; 
            width: 320px; 
            height: 100%;
            background: var(--surface);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1000; 
            padding: 30px 0;
            border-right: 1px solid var(--border);
        }

        .sidebar.active { left: 0; }

        .sidebar-header {
            padding: 0 25px 25px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .sidebar h3 { 
            font-size: 1.4rem; 
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar a {
            display: flex; 
            align-items: center; 
            gap: 15px; 
            padding: 15px 25px;
            text-decoration: none; 
            color: var(--text-secondary); 
            font-weight: 500;
            transition: all 0.3s;
            margin: 4px 15px;
            border-radius: 12px;
        }

        .sidebar a:hover { 
            background: var(--surface-hover); 
            color: var(--text);
            transform: translateX(5px);
        }

        .sidebar a i {
            width: 24px;
            text-align: center;
        }

        .overlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.7); 
            backdrop-filter: blur(4px);
            z-index: 999; 
            opacity: 0;
            transition: opacity 0.3s;
        }

        .overlay.active { 
            display: block; 
            opacity: 1;
        }

        /* Main Card */
        .card {
            background: var(--surface);
            width: 100%;
            max-width: 600px;
            padding: 50px 40px;
            border-radius: 32px;
            border: 1px solid var(--border);
            text-align: center;
            margin-top: 100px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(254, 44, 85, 0.5), transparent);
        }

        .brand-icon {
            width: 90px; 
            height: 90px; 
            background: var(--primary-gradient);
            color: white;
            border-radius: 24px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            margin: 0 auto 25px; 
            font-size: 2.5rem; 
            box-shadow: 0 20px 40px rgba(254, 44, 85, 0.3);
            position: relative;
            overflow: hidden;
        }

        .brand-icon::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        h2 { 
            font-size: 1.8rem; 
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        /* Input Box */
        .input-box {
            background: var(--dark-secondary); 
            padding: 6px; 
            border-radius: 20px;
            display: flex; 
            border: 2px solid var(--border); 
            transition: all 0.3s;
            margin-bottom: 25px;
            position: relative;
        }

        .input-box:focus-within { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 4px rgba(254, 44, 85, 0.1);
        }

        input { 
            flex: 1; 
            border: none; 
            background: transparent; 
            padding: 16px 20px; 
            outline: none; 
            color: var(--text);
            font-size: 1rem;
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        .btn-dl {
            background: var(--primary-gradient); 
            color: white; 
            border: none;
            padding: 14px 32px; 
            border-radius: 16px; 
            cursor: pointer; 
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-dl:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(254, 44, 85, 0.4);
        }

        .btn-dl:active {
            transform: translateY(0);
        }

        /* Result Section */
        #result { 
            display: none; 
            margin-top: 35px; 
            padding-top: 30px; 
            border-top: 1px solid var(--border);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .video-info {
            background: var(--dark-secondary);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: left;
            border: 1px solid var(--border);
        }

        .preview-img { 
            width: 100%; 
            border-radius: 16px; 
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .video-title { 
            font-size: 1rem; 
            font-weight: 600; 
            display: block;
            color: var(--text);
            line-height: 1.5;
        }

        .video-meta {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            background: var(--surface);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .meta-item i {
            color: var(--primary);
        }

        /* Download Buttons */
        .btn-group { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }
        
        .action-btn {
            padding: 18px; 
            border-radius: 16px; 
            border: none;
            font-size: 0.95rem; 
            font-weight: 700; 
            cursor: pointer;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            transition: all 0.3s; 
            color: white; 
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .action-btn:hover::before {
            left: 100%;
        }
        
        .btn-video { 
            background: linear-gradient(135deg, #fe2c55 0%, #ff4757 100%);
            box-shadow: 0 8px 25px rgba(254, 44, 85, 0.3);
        }

        .btn-video:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(254, 44, 85, 0.4);
        }
        
        .btn-music { 
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            box-shadow: 0 8px 25px rgba(0, 210, 255, 0.3);
        }

        .btn-music:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 210, 255, 0.4);
        }

        .btn-hd {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.3);
        }

        .btn-hd:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(245, 87, 108, 0.4);
        }

        /* Loader */
        .loader { 
            display: none; 
            margin: 30px 0;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Status */
        #status-dl { 
            font-size: 0.9rem; 
            margin-top: 20px; 
            color: var(--success);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--surface);
            color: var(--text);
            padding: 16px 28px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 2000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: var(--success);
        }

        .toast.error {
            border-color: var(--primary);
        }

        .toast i {
            font-size: 1.2rem;
        }

        .toast.success i {
            color: var(--success);
        }

        .toast.error i {
            color: var(--primary);
        }

        /* Features Grid */
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
        }

        .feature-item {
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            background: var(--dark-secondary);
            transition: all 0.3s;
        }

        .feature-item:hover {
            background: var(--surface-hover);
            transform: translateY(-3px);
        }

        .feature-item i {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .feature-item span {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .card {
                margin: 80px 15px 30px;
                padding: 35px 25px;
            }

            .btn-group {
                grid-template-columns: 1fr;
            }

            .features {
                grid-template-columns: 1fr;
            }

            h2 {
                font-size: 1.5rem;
            }
        }

        /* Quality Badge */
        .quality-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-left: 10px;
        }
    </style>
</head>

    <i class="fas fa-check-circle"></i>
    <span id="toast-message">Berhasil!</span>
</div>

<script>
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function handleEnter(e) {
        if (e.key === 'Enter') startDownload();
    }

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toast-message');
        const icon = toast.querySelector('i');
        
        toastMsg.textContent = message;
        toast.className = 'toast ' + type;
        
        if (type === 'success') {
            icon.className = 'fas fa-check-circle';
        } else {
            icon.className = 'fas fa-exclamation-circle';
        }
        
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function formatNumber(num) {
        if (!num) return '-';
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num.toString();
    }

    function formatDuration(seconds) {
        if (!seconds) return '-';
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return mins + ':' + secs.toString().padStart(2, '0');
    }

    async function downloadFile(url, filename, type) {
        if (!url) {
            showToast('Link tidak tersedia', 'error');
            return;
        }

        const status = document.getElementById('status-dl');
        const btnVideo = document.getElementById('btn-video');
        const btnMusic = document.getElementById('btn-music');
        
        // Disable buttons during download
        btnVideo.disabled = true;
        btnMusic.disabled = true;
        btnVideo.style.opacity = '0.6';
        btnMusic.style.opacity = '0.6';
        
        status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mempersiapkan download...';
        status.style.display = "flex";

        try {
            // Fetch the file as blob
            const response = await fetch(url);
            if (!response.ok) throw new Error('Network response was not ok');
            
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            
            // Create download link
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename || (type === 'video' ? 'tiktok-video.mp4' : 'tiktok-audio.mp3');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            window.URL.revokeObjectURL(blobUrl);
            
            status.innerHTML = '<i class="fas fa-check"></i> Download berhasil dimulai!';
            showToast(type === 'video' ? 'Video berhasil diunduh!' : 'Audio berhasil diunduh!');
            
            setTimeout(() => {
                status.style.display = "none";
            }, 3000);
            
        } catch (error) {
            console.error('Download error:', error);
            // Fallback: open in new tab
            window.open(url, '_blank');
            status.innerHTML = '<i class="fas fa-external-link-alt"></i> Membuka di tab baru...';
            showToast('Membuka link di tab baru', 'success');
            
            setTimeout(() => {
                status.style.display = "none";
            }, 3000);
        } finally {
            btnVideo.disabled = false;
            btnMusic.disabled = false;
            btnVideo.style.opacity = '1';
            btnMusic.style.opacity = '1';
        }
    }

    async function startDownload() {
        const urlInput = document.getElementById('tiktokUrl');
        const url = urlInput.value.trim();
        const loader = document.getElementById('loader');
        const resultDiv = document.getElementById('result');

        if (!url) {
            showToast('Masukkan link TikTok terlebih dahulu!', 'error');
            return;
        }

        // Validate URL
        if (!url.includes('tiktok.com')) {
            showToast('Link TikTok tidak valid!', 'error');
            return;
        }

        loader.style.display = "flex";
        resultDiv.style.display = "none";

        try {
            // Using multiple API options for better reliability
            const apis = [
                `https://www.tikwm.com/api/?url=${encodeURIComponent(url)}&hd=1`,
                `https://api.tiklydown.eu.org/api/download?url=${encodeURIComponent(url)}`
            ];
            
            let data = null;
            let success = false;
            
            // Try each API
            for (let apiUrl of apis) {
                try {
                    const proxy = "https://api.allorigins.win/get?url=";
                    const response = await fetch(proxy + encodeURIComponent(apiUrl), {
                        timeout: 10000
                    });
                    
                    if (!response.ok) continue;
                    
                    const json = await response.json();
                    const res = JSON.parse(json.contents);
                    
                    if (res.data || res.result) {
                        data = res.data || res.result;
                        success = true;
                        break;
                    }
                } catch (e) {
                    console.log('API failed:', e);
                    continue;
                }
            }

            if (!success || !data) throw new Error("Gagal mengambil data dari semua sumber");

            // Update UI with video info
            document.getElementById('v-title').innerText = data.title || "TikTok Video";
            document.getElementById('v-author').innerText = data.author?.nickname || data.author || "-";
            document.getElementById('v-duration').innerText = formatDuration(data.duration);
            document.getElementById('v-views').innerText = formatNumber(data.play_count || data.stats?.playCount);
            
            // Fix link helper
            const getLink = (path) => {
                if (!path) return null;
                return path.startsWith('http') ? path : "https://www.tikwm.com" + path;
            };

            // Set cover image
            const coverUrl = data.cover || data.thumbnail;
            if (coverUrl) {
                document.getElementById('v-cover').src = getLink(coverUrl) || coverUrl;
            }

            // Get download links
            const videoLink = getLink(data.hdplay || data.play || data.video?.[0]);
            const musicLink = getLink(data.music || data.audio?.[0]);

            // Setup download buttons
            document.getElementById('btn-video').onclick = () => {
                if (videoLink) {
                    downloadFile(videoLink, `tiktok-${Date.now()}.mp4`, 'video');
                } else {
                    showToast('Link video tidak tersedia', 'error');
                }
            };
            
            document.getElementById('btn-music').onclick = () => {
                if (musicLink) {
                    downloadFile(musicLink, `tiktok-audio-${Date.now()}.mp3`, 'audio');
                } else {
                    showToast('Link audio tidak tersedia', 'error');
                }
            };

            resultDiv.style.display = "block";
            showToast('Video berhasil ditemukan!');
            
        } catch (err) {
            console.error(err);
            showToast('Gagal mengambil data. Coba link lain!', 'error');
        } finally {
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
